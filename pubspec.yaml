name: bookly
description: Production-ready Flutter scaffold generated by the wizard.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_riverpod: ^3.3.2

  # Backend – Firebase

  # Backend – Supabase

  # Backend – Appwrite

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Icons

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^12.0.1
  geolocator: ^14.0.2

  # Device & System
  device_info_plus: ^11.2.0
  app_version_update: ^6.2.0


  # Localization

  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation

dependency_overrides:
  # Riverpod 3.x requires a newer test_api than what Flutter SDK pins.
  # This override allows resolution while remaining compatible with flutter_test.
  test_api: 0.7.6

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Thin.ttf
        - asset: assets/fonts/Poppins-Black.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-ExtraBold.ttf
        - asset: assets/fonts/Poppins-ExtraLight.ttf
        - asset: assets/fonts/Poppins-Italic.ttf
    - family: Poppins LightItalic
      fonts:
        - asset: assets/fonts/Poppins-LightItalic.ttf
    - family: Poppins MediumItalic
      fonts:
        - asset: assets/fonts/Poppins-MediumItalic.ttf
    - family: Poppins SemiBoldItalic
      fonts:
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
    - family: Poppins ThinItalic
      fonts:
        - asset: assets/fonts/Poppins-ThinItalic.ttf
    - family: Poppins BlackItalic
      fonts:
        - asset: assets/fonts/Poppins-BlackItalic.ttf
    - family: Poppins BoldItalic
      fonts:
        - asset: assets/fonts/Poppins-BoldItalic.ttf
    - family: Poppins ExtraBoldItalic
      fonts:
        - asset: assets/fonts/Poppins-ExtraBoldItalic.ttf
    - family: Poppins ExtraLightItalic
      fonts:
        - asset: assets/fonts/Poppins-ExtraLightItalic.ttf
